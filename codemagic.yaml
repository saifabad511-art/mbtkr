workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 30
    instance_type: linux
    environment:
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Unzip and prepare files
        script: |
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o *.zip
          
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            subfolder=$(find . -maxdepth 2 -name "build.gradle*" -exec dirname {} \;)
            if [ -n "$subfolder" ] && [ "$subfolder" != "." ]; then
              cp -r $subfolder/* .
            fi
          fi
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android App (Debug APK)
        script: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleDebug
          else
            gradle assembleDebug
          fi
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - saifabad511@gmail.com
