name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Unzip and prepare files
        run: |
          echo "جاري فك ضغط ملفات المشروع..."
          unzip -o *.zip
          
          # نقل الملفات للمجلد الرئيسي إذا كانت مستخرجة داخل مجلد فرعي
          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            subfolder=$(find . -maxdepth 2 -name "build.gradle*" -exec dirname {} \;)
            if [ -n "$subfolder" ] && [ "$subfolder" != "." ]; then
              echo "نقل الملفات من: $subfolder"
              cp -r $subfolder/* .
            fi
          fi

      - name: Build APK with Project Wrapper
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleDebug
          else
            echo "الملف مفقود، المحاولة بالنظام الافتراضي..."
            gradle assembleDebug
          fi

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Mubtakir-APK
          path: app/build/outputs/apk/debug/*.apk
